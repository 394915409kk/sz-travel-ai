services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
      - sqlite_data:/data
    environment:
      APP_ENV: development
      SQLITE_DB_PATH: /data/travel_products.db
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python -m apps.backend.init_db
      && uvicorn apps.backend.main:app --host 0.0.0.0 --port 8000"

volumes:
  sqlite_data:
